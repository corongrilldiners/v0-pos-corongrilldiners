<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – Coron Grill Diners POS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f4f4f5; color: #18181b;
    }
    .card {
      background: white; border-radius: 16px; padding: 48px;
      text-align: center; max-width: 400px; width: 90%;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #71717a; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #18181b; color: white; border: none;
      padding: 12px 24px; border-radius: 8px; font-size: 15px;
      cursor: pointer; font-weight: 600;
    }
    button:hover { background: #3f3f46; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      Coron Grill Diners POS is offline. <br />
      Any orders placed will be saved locally and synced when the connection returns.
    </p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
